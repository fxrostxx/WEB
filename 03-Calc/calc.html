<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Calculator</title>
    <link rel="stylesheet" href="calc.css" />
</head>
<body>
    <div class="main-window">
        <div class="title-bar">
            <div class="title-bar-left-side">
                <img src="calc_icon.png" class="app-icon" />
                <div>Calculator</div>
            </div>
            <div class="title-bar-right-side">
                <button class="control-button"><div class="control-button-label" style="margin-left: -4px;">&#X1F5D5;</div></button>
                <button class="control-button" disabled><div class="control-button-label">&#128470;</div></button>
                <button class="control-button close-button"><div class="control-button-label" style="margin-top: -2px;">&#10006;</div></button>
            </div>
        </div>
        <!-- ------------------------------------------------------ -->
        <div class="client-rect">
            <div class="work-area">
                <div class="menu-bar">
                    <button class="menu-button">Edit</button>
                    <button class="menu-button">View</button>
                    <button class="menu-button">Help</button>
                </div>
                <div class="display-container">
                    <input type="text" class="display" />
                </div>
                <!-- ------------------------------------------------------ -->
                <div class="calc-buttons">
                    <!--<div class="memory-buttons">
                        <div class="square"></div>
                        <button>MC</button>
                        <button>MR</button>
                        <button>MS</button>
                        <button>M+</button>
                    </div>-->
                    <div class="square"></div>
                    <div class="clear-buttons">
                        <button>Backspace</button>
                        <button>CE</button>
                        <button>C</button>
                    </div>
                    <!-- ------------------------------------------------------ -->
                    <button>MC</button>
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>/</button>
                    <button>sqrt</button>
                    <!-- ------------------------------------------------------ -->
                    <button>MR</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>*</button>
                    <button>%</button>
                    <!-- ------------------------------------------------------ -->
                    <button>MS</button>
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>-</button>
                    <button>1/x</button>
                    <!-- ------------------------------------------------------ -->
                    <button>M+</button>
                    <button>0</button>
                    <button>+/-</button>
                    <button>.</button>
                    <button>+</button>
                    <button>=</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
